version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_platform_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_knowledge_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: ai_platform_chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  # ── FastAPI Backend ─────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_platform_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_knowledge_platform
      CHROMA_PERSIST_DIR: /app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - embeddings_cache:/root/.cache
      - app_data:/app/data
    restart: unless-stopped

  # ── Streamlit Frontend ─────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_platform_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=1024
      - STREAMLIT_SERVER_MAX_MESSAGE_SIZE=1024
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  pgdata:
  chromadata:
  embeddings_cache:
  app_data:
