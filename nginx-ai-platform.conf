server {
    listen 80;
    server_name 54.175.54.77;

    # === Large File Upload Configuration ===
    # Maximum upload size - 1GB
    client_max_body_size 1G;

    # Buffer size for reading client request body
    client_body_buffer_size 128k;

    # Timeouts for client body transmission
    client_body_timeout 300s;
    send_timeout 300s;

    # Keep connections alive longer for large uploads
    keepalive_timeout 300s;

    # Increase buffer sizes for large requests
    large_client_header_buffers 4 32k;

    # Temporary file storage for uploads
    client_body_temp_path /tmp/nginx_upload_temp 1 2;

    # Try to read the entire client request body in a single buffer
    client_body_in_single_buffer off;

    # Error logging for debugging
    error_log /var/log/nginx/ai-platform-error.log warn;

    # Backend API routes
    location /api/ {
        # Proxy to FastAPI backend
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache settings
        proxy_cache_bypass $http_upgrade;

        # Timeouts - increased for large file processing
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for upload progress tracking
        # This allows the client to see real-time upload progress
        proxy_request_buffering off;
        proxy_buffering off;

        # Buffer sizes for large uploads
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Maximum size for proxied request body (should match client_max_body_size)
        client_max_body_size 1G;
    }

    # Backend docs
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend Streamlit - default route
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Streamlit websocket
    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
