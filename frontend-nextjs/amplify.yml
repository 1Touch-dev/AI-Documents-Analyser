version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - echo "Node version:" && node --version
            - echo "NPM version:" && npm --version
        build:
          commands:
            # Set NEXT_PUBLIC_API_URL: use Amplify Console value, or change DEFAULT_API_URL below.
            # Must create .env.production AND export in same shell as "npm run build" so Next.js sees it.
            - |
              DEFAULT_API_URL="http://54.175.54.77/api"
              export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-$DEFAULT_API_URL}"
              echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > .env.production
              env | grep -E '^NEXT_PUBLIC_' | grep -v '^NEXT_PUBLIC_API_URL=' >> .env.production 2>/dev/null || true
              echo "Build using API URL: $NEXT_PUBLIC_API_URL"
              npm run build
            - echo "Build completed successfully"
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
